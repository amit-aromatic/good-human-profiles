<!doctype html>
<html lang="en" class="h-100">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Good Human</title>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
      /* hide number input spin buttons */
      #increment::-webkit-inner-spin-button,
      #increment::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      #increment {
        -moz-appearance: textfield;
        appearance: textfield;
      }
    </style>
  </head>
  <body style="background-color:#0f1724; color:#f8fafc;" class="d-flex flex-column h-100">
    <header>
      <nav class="navbar navbar-expand-lg bg-body-tertiary mb-2">
        <div class="container-fluid">
          <span class="navbar-brand">The Good Human</span>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="/">Home</a>
              </li>
            </ul>
            <div class="d-flex" role="search">
              <ul class="navbar-nav">
                <li class="nav-item me-2" style="display: auto;" id="login-nav">
                  <a id="login-url" class="nav-link" href="">Login</a>
                </li>
                <li class="nav-item dropdown me-2" style="display: none;" id="logout-nav">
                  <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                    User
                  </a>
                  <ul class="dropdown-menu" style="left:auto; right: 0px;">
                    <li><a class="dropdown-item" href="/account">My Account</a></li>
                    <li><a class="dropdown-item" href="/counter">My Counter</a></li>
                    <!-- <li><hr class="dropdown-divider"></li> -->
                    <li><a id="logout-url" class="dropdown-item" href="">Logout</a></li>
                  </ul>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
    </header>



    <main class="flex-shrink-0">
      <div class="container text-left">
        <div class="row p-2 justify-content-center">
          <div id="counter" class="col-12 col-md-6 p-4 bg-opacity-90 rounded-4 border border-secondary">
            <div class="mb-3">
              <label for="naamInput" class="form-label text-light-na">Naam being recited</label>
              <input type="text" value="Radha Radha" class="form-control bg-black text-light border-secondary" id="naamInput" placeholder="Enter naam or mantra" style="font-size: 1.1rem;">
            </div>
            <div class="mb-3">
              <label for="themeSelect" class="form-label text-light-na">Theme</label>
              <select id="themeSelect" class="form-select bg-black text-light-na border-secondary" style="font-size: 1rem;">
                <option value="default">Night</option>
                <option value="yellowish">Yellowish</option>
                <option value="bluish">Bluish</option>
                <option value="greenish">Greenish</option>
              </select>
            </div>
            <p class="text-light-na mb-4">Track your recitation. 1 maala = 108 repetitions.</p>

            <div class="mb-3">
              <label for="increment" class="form-label text-light-na">Current Count</label>
              <div class="input-group input-group-lg">
                <input type="number" class="form-control bg-black text-light border-secondary" id="increment" value="0" style="font-size: 2rem; text-align: center;">
                <span class="input-group-text bg-black text-light border-secondary">/ 108</span>
              </div>
            </div>

            <div class="row g-2 mb-3">
              <div class="col-6">
                <button type="button" class="btn btn-outline-light w-100" id="resetBtn">Reset</button>
              </div>
              <div class="col-6">
                <button type="button" class="btn btn-light w-100" id="incrementBtn">+1</button>
              </div>
            </div>

            <div class="d-flex justify-content-between text-light-na small">
              <div>Completed maala: <span id="completedMaala">0</span></div>
              <div>Remaining: <span id="remainingCount">108</span></div>
            </div>
          </div>
        </div>
      </div>
    </main>



    <footer class="footer mt-auto py-3 bg-body-tertiary">
      <div class="container text-secondary">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="/privacy-policy">Privacy Policy</a>
          </li>
        </ul>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.min.js" integrity="sha512-3j3VU6WC5rPQB4Ld1jnLV7Kd5xr+cq9avvhwqzbH/taCRNURoeEpoPBK9pDyeukwSxwRPJ8fDgvYXd6SkaZ2TA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="/assets/js/common.js" type="text/javascript"></script>
    <script src="/assets/js/counter.js" type="text/javascript"></script>
  </body>
</html>
