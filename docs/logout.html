<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
<script>
$(document).ready(async function () {
    const cookies = ["refresh_token", "access_token", "username"];

    if (window.cookieStore && typeof window.cookieStore.delete === "function") {
        await Promise.all(cookies.map((name) => window.cookieStore.delete({
            name,
            domain: "goodhuman.in",
        })));
    } else {
        cookies.forEach((name) => {
            document.cookie = `${name}=; Max-Age=0; path=/; domain=goodhuman.in`;
            document.cookie = `${name}=; Max-Age=0; path=/`;
        });
    }

    window.location.href = "/";
});
</script>
